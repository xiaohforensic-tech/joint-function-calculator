<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f4ed">
  <meta name="description" content="法医临床四肢大关节功能丧失百分比辅助计算与记录工具">
  <meta name="application-name" content="关节计算">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta property="og:type" content="website">
  <meta property="og:title" content="关节功能丧失辅助计算">
  <meta property="og:description" content="法医临床活动度计算与记录">
  <title>关节功能丧失辅助计算</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=1.8.0">
</head>
<body>
  <header class="topbar no-print">
    <div class="brand-mark" aria-hidden="true">衡</div>
    <div><strong>关节功能丧失计算</strong><span>法医临床辅助工具</span></div>
    <button class="icon-button" id="installButton" hidden>安装</button>
  </header>

  <main>
    <section class="hero no-print"><div><span class="eyebrow">FORENSIC CLINICAL TOOL</span><h1>关节功能丧失计算</h1><p>记录测量，核对规则，生成可复核的计算记录。</p></div></section>

    <div class="layout">
      <section class="workspace no-print">
        <form id="calculatorForm" novalidate>
          <div class="card">
            <div class="section-heading"><div><h2>基本信息</h2></div></div>
            <div class="form-grid meta-grid">
              <label>案件编号<input name="caseNumber" placeholder="例：（2026）临鉴字第001号"></label>
              <label>被鉴定人<input name="subjectName" placeholder="姓名或匿名编号"></label>
              <label>检验日期<input name="examDate" type="date"></label>
              <label>记录人<input name="examiner" placeholder="鉴定人/助理"></label>
              <label>鉴定目的<select name="appraisalType" id="appraisalType"><option value="injury">人体损伤程度鉴定</option><option value="disability" selected>人体损伤致残程度鉴定</option></select></label>
              <label>受检侧<select name="side"><option value="左侧">左侧</option><option value="右侧">右侧</option><option value="双侧分别计算">双侧分别计算</option><option value="不分侧">不分侧</option></select></label>
              <label>关节<select name="jointId" id="jointSelect"></select></label>
              <label>计算方法<select name="method" id="methodSelect"><option value="table">查表法（活动度 × 肌力）</option><option value="direction" selected>方向均分法</option><option value="hand">手功能专用</option></select></label>
              <label>对照依据<select name="referenceMode" id="referenceMode"><option value="healthy">健侧实测值</option><option value="standardUpper">正常参考值（区间上限）</option><option value="standardLower">正常参考值（区间下限）</option></select></label>
            </div>
            <div id="methodNotice" class="notice"></div>
          </div>

          <div class="card">
            <div class="section-heading"><div><h2>活动度测量</h2><p id="jointNote"></p></div></div>
            <div class="legend"><span><i class="dot affected"></i><span id="affectedLegendText">伤侧输入</span></span><span><i class="dot reference"></i><span id="referenceLegendText">健侧/对照输入</span></span><span>单位：度（°）</span></div>
            <div class="measurement-table" id="measurementTable"></div>
            <div class="field-help" id="measurementHelp">单位：度（°）。查表法录入被动活动度和对应肌力。</div>
          </div>

          <div class="action-bar">
            <button type="reset" class="button ghost">重置</button>
            <button type="submit" class="button primary">生成完整计算记录</button>
          </div>
        </form>
      </section>

      <aside class="side-panel no-print">
        <div class="result-card" id="liveSummary">
          <span class="result-label">计算结果</span><h3>等待计算</h3><p>填写角度后生成记录</p>
        </div>
        <div class="card compact"><h3>本机记录</h3><div id="historyList" class="history-list"><p class="muted">尚无已保存记录</p></div></div>
        <div class="card compact source-card"><h3>计算依据</h3><p>《人体损伤程度鉴定标准》《人体损伤致残程度分级》、SF/T 0111—2021、SF/T 0096—2021</p><p class="version">规则版本 1.8.0</p></div>
      </aside>
    </div>

    <section id="record" class="record" hidden aria-live="polite"></section>
  </main>

  <footer class="no-print"><p>计算结果仅供辅助复核</p></footer>
  <div id="toast" class="toast no-print" role="status"></div>

  <script src="src/joint-data.js?v=1.8.0"></script>
  <script src="src/calculator.js?v=1.8.0"></script>
  <script src="app.js?v=1.8.0"></script>
</body>
</html>
